services:
  smartdns:
    image: jeffok/smartdns:latest
    container_name: smartdns
    restart: always
    network_mode: "host"
    volumes:
      - ./data/rules:/etc/smartdns/rules
      - ./data/logs:/var/log/smartdns
      - ./docker/scripts/sync-ai.sh:/opt/smartdns/sync-ai.sh:ro
    env_file: .env
