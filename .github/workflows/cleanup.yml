name: cleanup

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Delete old Docker Hub tags
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          # 获取所有标签
          TAGS=$(curl -sS "https://hub.docker.com/v2/repositories/${DOCKER_USERNAME}/smartdns/tags?page_size=50" \
            | python3 -c "
          import json,sys
          keep = {'latest'}
          d = json.load(sys.stdin)
          for r in d.get('results',[]):
              name = r['name']
              if name not in keep:
                  print(name)
          ")
          
          # 删除旧标签（保留 latest）
          DL_TOKEN=$(curl -sS "https://hub.docker.com/v2/users/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${DOCKER_USERNAME}\",\"password\":\"${DOCKER_TOKEN}\"}" \
            | python3 -c "import json,sys; print(json.load(sys.stdin).get('token',''))")
          
          COUNT=0
          for tag in $TAGS; do
            STATUS=$(curl -sS -o /dev/null -w '%{http_code}' -X DELETE \
              -H "Authorization: Bearer $DL_TOKEN" \
              "https://hub.docker.com/v2/repositories/${DOCKER_USERNAME}/smartdns/tags/${tag}/")
            echo "deleted tag: $tag (HTTP $STATUS)"
            COUNT=$((COUNT + 1))
          done
          echo "total deleted: $COUNT"

      - name: Delete old GitHub Actions runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 保留最近的 5 次成功运行，删除其余
          RUNS=$(gh run list --repo ${{ github.repository }} --limit 50 --json databaseId --jq '.[].databaseId')
          KEEP=0
          for RUN_ID in $RUNS; do
            if [ $KEEP -lt 5 ]; then
              KEEP=$((KEEP + 1))
              continue
            fi
            gh run delete $RUN_ID --repo ${{ github.repository }} 2>/dev/null
            echo "deleted run: $RUN_ID"
          done
